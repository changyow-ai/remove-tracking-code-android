name: Android

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed for creating releases on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      URLCLEANER_KEYSTORE_PASSWORD: ${{ secrets.URLCLEANER_KEYSTORE_PASSWORD }}
      URLCLEANER_KEY_ALIAS: ${{ secrets.URLCLEANER_KEY_ALIAS }}
      URLCLEANER_KEY_PASSWORD: ${{ secrets.URLCLEANER_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute for gradlew
        run: chmod +x ./gradlew

      - name: Lint and unit tests
        run: ./gradlew lint testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build signed release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
          draft: false
          generate_release_notes: true
